name: Kakao Token Exchange

on:
  workflow_dispatch:
    inputs:
      code:
        description: 'Kakao authorization code'
        required: true

jobs:
  exchange:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange code for tokens
        env:
          KAKAO_CODE: ${{ github.event.inputs.code }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
        run: |
          node -e "
          const params = new URLSearchParams({
            grant_type: 'authorization_code',
            client_id: process.env.KAKAO_REST_API_KEY,
            redirect_uri: 'http://localhost:3000/callback',
            code: process.env.KAKAO_CODE
          });
          fetch('https://kauth.kakao.com/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: params.toString()
          }).then(r => r.json()).then(d => {
            console.log('=== TOKENS ===');
            console.log('refresh_token=' + d.refresh_token);
            console.log('access_token=' + d.access_token);
            if (d.error) console.log('error=' + JSON.stringify(d));
          }).catch(e => console.error(e));
          "
