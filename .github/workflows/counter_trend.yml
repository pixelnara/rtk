name: Counter-Trend Stock KakaoTalk Message

on:
  schedule:
    # UTC 기준 (KST = UTC+9): 21:10 UTC = 06:10 KST, 04:10 UTC = 13:10 KST, 11:10 UTC = 20:10 KST
    - cron: '10 4,11,21 * * *'   # 매일 06:10 · 13:10 · 20:10 (KST) 하루 3회
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send counter-trend message
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: node scripts/counter_trend.mjs
