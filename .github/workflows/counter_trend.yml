name: Counter-Trend Stock KakaoTalk Message

on:
  schedule:
    # UTC 기준 (KST = UTC+9): 21:10 UTC = 06:10 KST, 04:10 UTC = 13:10 KST, 11:10 UTC = 20:10 KST
    - cron: '10 4,11,21 * * *'   # 매일 06:10 · 13:10 · 20:10 (KST) 하루 3회
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send counter-trend message
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: node scripts/counter_trend.mjs

      # 카카오가 새 refresh_token을 발급하면 GitHub Secret 자동 갱신 (장기 안정성)
      - name: Persist new Kakao refresh token (if renewed)
        if: env.NEW_KAKAO_REFRESH_TOKEN != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️ GH_PAT 미설정 — 토큰 자동 저장 건너뜀 (KAKAO_REFRESH_TOKEN 수동 갱신 필요)"
            exit 0
          fi
          gh secret set KAKAO_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" --body "$NEW_KAKAO_REFRESH_TOKEN"
          echo "✅ KAKAO_REFRESH_TOKEN 자동 갱신됨"
