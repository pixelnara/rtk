name: Daily Stock KakaoTalk Message

on:
  schedule:
    - cron: '52 0 * * *'   # 매일 09:52 KST
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Send daily stock message via Claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          direct_prompt: |
            오늘 반도체·AI 관련주 시장 동향을 조사해서 카카오톡으로 2개 메시지를 보내줘.
            각 메시지는 200자 이하로.
            메시지1: 오늘의 주요 등락 이유 3가지 (이모지·수치 포함)
            메시지2: 단기·중기 전망 및 주목 섹터/종목
            반드시 KakaotalkChat-MemoChat 도구를 사용해서 전송해줘.
