name: Daily Stock KakaoTalk Message

on:
  schedule:
    # UTC 기준 (KST = UTC+9)
    # 21:00 UTC = 06:00 KST, 01:00 UTC = 10:00 KST, 06:00 UTC = 15:00 KST
    # 09:00 UTC = 18:00 KST, 12:00 UTC = 21:00 KST
    - cron: '0 1,6,9,12,21 * * *'   # 오전 6·10시, 오후 3·6·9시 (KST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily stock message
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: node scripts/daily_message.mjs

      # 카카오가 새 refresh_token을 발급하면 GitHub Secret 자동 갱신 (장기 안정성)
      # GH_PAT: secrets 쓰기 권한 있는 PAT 필요 (없으면 이 단계만 건너뜀, 발송엔 영향 없음)
      - name: Persist new Kakao refresh token (if renewed)
        if: env.NEW_KAKAO_REFRESH_TOKEN != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "⚠️ GH_PAT 미설정 — 토큰 자동 저장 건너뜀 (KAKAO_REFRESH_TOKEN 수동 갱신 필요)"
            exit 0
          fi
          gh secret set KAKAO_REFRESH_TOKEN --repo "$GITHUB_REPOSITORY" --body "$NEW_KAKAO_REFRESH_TOKEN"
          echo "✅ KAKAO_REFRESH_TOKEN 자동 갱신됨"
