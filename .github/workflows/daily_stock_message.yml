name: Daily Stock KakaoTalk Message

on:
  schedule:
    # UTC 기준 (KST = UTC+9): 23:00 UTC = 08:00 KST, 11:00 UTC = 20:00 KST
    - cron: '0 11,23 * * *'   # 매일 오전 8시 · 오후 8시 (KST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily stock message
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: node scripts/daily_message.mjs
