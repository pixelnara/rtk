name: Daily Stock KakaoTalk Message

on:
  schedule:
    # UTC 기준 (KST = UTC+9)
    # 21:00 UTC = 06:00 KST, 01:00 UTC = 10:00 KST, 06:00 UTC = 15:00 KST
    # 09:00 UTC = 18:00 KST, 12:00 UTC = 21:00 KST
    - cron: '0 1,6,9,12,21 * * *'   # 오전 6·10시, 오후 3·6·9시 (KST)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send-message:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send daily stock message
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: node scripts/daily_message.mjs
